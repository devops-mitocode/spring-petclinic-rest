apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-petclinic-rest
spec:
  replicas: 3
  selector:
    matchLabels:
      app: spring-petclinic-rest
  template:
    spec:
      automountServiceAccountToken: false
      containers:
        - name: spring-petclinic-rest
          resources:
            limits:
              cpu: "1"
              memory: "1Gi"
          image: danycenas/spring-petclinic-rest:3.2.3
          ports:
            - containerPort: 9966